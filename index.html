// ═══════════════════════════════════════════════════════
//  EVENTS
// ═══════════════════════════════════════════════════════
function loadDemo(){
  const releases=buildDemoReleases();
  const {genres,styles,decades}=collectMeta(releases);
  Object.assign(S,{releases,allGenres:genres,allStyles:styles,allDecades:decades,
    totalReleases:releases.length,loaded:true,error:"",username:"demo",idbStatus:"empty"});
  renderFull();
}

function attachConnectEvents(){
  document.getElementById("oauth-btn")?.addEventListener("click",()=>{ window.location.href="/api/auth"; });
  document.getElementById("demo-btn")?.addEventListener("click",loadDemo);
  document.getElementById("m-api")?.addEventListener("click",()=>{S.method="api";renderFull();});
  document.getElementById("m-csv")?.addEventListener("click",()=>{S.method="csv";renderFull();});
  document.getElementById("load-cache-btn")?.addEventListener("click",()=>{S.loaded=true;renderFull();});
  document.getElementById("auto-load-btn")?.addEventListener("click",()=>{ loadCollection(); });
  document.getElementById("disconnect-btn")?.addEventListener("click",async()=>{
    try{ await dbDelete("discogs_auth"); }catch(e){}
    S.token=""; S.username=""; renderFull();
  });
  document.getElementById("clear-cache-btn")?.addEventListener("click",async()=>{
    await clearDB();S.releases=[];S.idbSavedAt=null;renderFull();
  });
  renderMethodBody();
}

function renderMethodBody(){
  const body=document.getElementById("method-body");
  if(!body) return;
  if(S.method==="api"){
    body.innerHTML=
      '<div class="inp-row"><input class="inp" id="inp-user" placeholder="Discogs username" value="'+esc(S.username)+'"/></div>'
      +'<div class="inp-row"><input class="inp" id="inp-tok" type="password" placeholder="Personal access token…" value="'+esc(S.token)+'"/>'
        +'<button class="btn" id="api-go" '+(S.loading?"disabled":"")+'>'+(S.loading?"Loading…":"Load")+'</button></div>'
      +'<p class="note">Get token: <a href="https://www.discogs.com/settings/developers" target="_blank">discogs.com → Settings → Developers → Generate token</a></p>'
      +'<div class="load-tip">⏱ Fetches full collection then each tracklist. Large libraries: 3–10 min. Cached to IndexedDB — instant on return.<br/><br/>💾 <strong>Gig-proof:</strong> If APIs fail, local metadata is used as fallback.</div>';
    document.getElementById("inp-user").addEventListener("input",e=>{S.username=e.target.value;});
    document.getElementById("inp-tok").addEventListener("input",e=>{S.token=e.target.value;});
    document.getElementById("inp-tok").addEventListener("keydown",e=>{if(e.key==="Enter")startLoad();});
    document.getElementById("api-go").addEventListener("click",startLoad);
  } else {
    body.innerHTML=
      '<label class="drop-zone" id="dz"><input type="file" accept=".csv" id="csv-inp" style="display:none"/>'
        +'📂 Drop Discogs CSV here or click to browse'
        +'<small>Export from discogs.com → My Collection → Export</small>'
      +'</label>'
      +'<p class="note">CSV loads instantly.</p>';
    const dz=document.getElementById("dz"),ci=document.getElementById("csv-inp");
    dz.addEventListener("click",()=>ci.click());
    dz.addEventListener("dragover",e=>{e.preventDefault();dz.classList.add("dg");});
    dz.addEventListener("dragleave",()=>dz.classList.remove("dg"));
    dz.addEventListener("drop",e=>{e.preventDefault();dz.classList.remove("dg");doCSVLoad(e.dataTransfer.files[0]);});
    ci.addEventListener("change",e=>doCSVLoad(e.target.files[0]));
  }
}

function startLoad(){
  if(!S.token.trim()){alert("Please enter your Discogs token.");return;}
  loadCollection();
}
function doCSVLoad(file){
  if(!file) return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const releases=parseCSV(e.target.result);
      if(!releases.length) throw new Error("No records found.");
      const {genres,styles,decades}=collectMeta(releases);
      Object.assign(S,{releases,allGenres:genres,allStyles:styles,allDecades:decades,
        totalReleases:releases.length,loaded:true,error:""});
      renderFull();scheduleSave();
    }catch(err){S.error="CSV error: "+err.message;renderFull();}
  };
  r.readAsText(file);
}

let globalClickAttached=false;
function attachMainEvents(){
  document.getElementById("enrich-btn")?.addEventListener("click",()=>{
    if(enrichStats.running) return;
    const toEnrich=allTracks().filter(t=>t.bpmSource!=="enriched"||t.keySource!=="enriched");
    if(!toEnrich.length){alert("All tracks already enriched!");return;}
    enrichCollection(S.releases);
  });
  document.getElementById("logout-btn")?.addEventListener("click",async()=>{
    try{ await dbDelete("discogs_auth"); await dbDelete("collection_data"); await dbDelete("dj_set"); }catch(e){}
    location.reload();
  });
  document.getElementById("reset-btn")?.addEventListener("click",()=>{
    document.removeEventListener("click",handleGlobalClick);
    globalClickAttached=false;
    Object.assign(S,{loaded:false,releases:[],djSet:[],allGenres:[],allStyles:[],allDecades:[],
      roleFilters:new Set(),genreFilters:new Set(),styleFilters:new Set(),decadeFilters:new Set(),
      search:"",page:1,error:"",fetchProgress:0,loadMsg:"",loading:false,token:"",tab:"set"});
    renderFull();
  });
  document.getElementById("tc-bar")?.addEventListener("click",function(){
    var body=document.getElementById("tagcloud-wrap");
    var tog=document.getElementById("tc-tog");
    if(!body) return;
    var open=body.classList.contains("open");
    body.classList.toggle("open",!open);
    if(tog) tog.classList.toggle("open",!open);
  });
  document.getElementById("search-input")?.addEventListener("input",e=>{
    S.search=e.target.value;S.page=1;updateRecordList();
  });
  document.querySelectorAll(".tab").forEach(btn=>{
    btn.addEventListener("click",()=>{S.tab=btn.dataset.tab;updateTabBtns();updateRightPanel();});
  });
  document.getElementById("pager-prev")?.addEventListener("click",()=>{S.page=Math.max(1,S.page-1);updateRecordList();});
  document.getElementById("pager-next")?.addEventListener("click",()=>{
    const tp=Math.ceil(filteredTracks().length/PAGE);S.page=Math.min(tp,S.page+1);updateRecordList();
  });
  document.getElementById("engine1-btn")?.addEventListener("click",()=>{
    const pool=filteredTracks().filter(t=>t.key&&t.bpm);
    const src=pool.length?pool:allTracks().filter(t=>t.key&&t.bpm);
    if(!src.length){alert("No tracks with harmonic data found.");return;}
    const anyFilter=S.roleFilters.size>0||S.genreFilters.size>0||S.styleFilters.size>0||S.decadeFilters.size>0;
    const size=Math.min(anyFilter?30:20,src.length);
    const set=engine1BuildSet(src,size);
    if(!set.length){alert("Could not build a set. Try fewer filters.");return;}
    S.djSet=set;S.tab="set";updateTabBtns();updateRightPanel();updateRecordList();
    document.querySelector(".right-panel .scroll")?.scrollTo(0,0);
  });
  document.getElementById("engine2-btn")?.addEventListener("click",()=>{
    if(S.djSet.length<2){alert("Add at least 2 tracks first.");return;}
    S.djSet=engine2SortSet(S.djSet);updateSetPanel();updateTabBtns();
  });
  if(!globalClickAttached){
    document.addEventListener("click",handleGlobalClick);
    globalClickAttached=true;
  }
}

function handleGlobalClick(e){
  // Role filter clear
  if(e.target.closest("[data-rc-clear]")){S.roleFilters=new Set();S.page=1;updateChips();updateRecordList();return;}
  // Role filter chip
  const rc=e.target.closest("[data-rc]");
  if(rc&&!rc.hasAttribute("data-rc-clear")){
    const id=rc.dataset.rc;const nf=new Set(S.roleFilters);nf.has(id)?nf.delete(id):nf.add(id);
    S.roleFilters=nf;S.page=1;updateChips();updateRecordList();return;
  }
  // Genre filter clear
  if(e.target.closest("[data-gc-clear]")){S.genreFilters=new Set();S.page=1;updateChips();updateRecordList();return;}
  // Genre filter chip
  const gc=e.target.closest("[data-gc]");
  if(gc&&!gc.hasAttribute("data-gc-clear")){
    const g=gc.dataset.gc;const nf=new Set(S.genreFilters);nf.has(g)?nf.delete(g):nf.add(g);
    S.genreFilters=nf;S.page=1;updateChips();updateRecordList();return;
  }
  // Style filter clear
  if(e.target.closest("[data-sc-clear]")){S.styleFilters=new Set();S.page=1;updateChips();updateRecordList();return;}
  // Style filter chip
  const sc=e.target.closest("[data-sc]");
  if(sc&&!sc.hasAttribute("data-sc-clear")){
    const s=sc.dataset.sc;const nf=new Set(S.styleFilters);nf.has(s)?nf.delete(s):nf.add(s);
    S.styleFilters=nf;S.page=1;updateChips();updateRecordList();return;
  }
  // Decade filter clear
  if(e.target.closest("[data-dc-clear]")){S.decadeFilters=new Set();S.page=1;updateChips();updateRecordList();return;}
  // Decade filter chip
  const dc=e.target.closest("[data-dc]");
  if(dc&&!dc.hasAttribute("data-dc-clear")){
    const d=dc.dataset.dc;const nf=new Set(S.decadeFilters);nf.has(d)?nf.delete(d):nf.add(d);
    S.decadeFilters=nf;S.page=1;updateChips();updateRecordList();return;
  }
  // Role override per-track button
  const rs=e.target.closest("[data-rs]");
  if(rs){
    const[tid,role]=rs.dataset.rs.split("|");
    const track=allTracks().find(t=>t.id===tid);
    if(track){
      track.roleOverride=(track.roleOverride===role)?null:role;
      updateRecordList();
      const si=S.djSet.findIndex(t=>t.id===tid);
      if(si>=0){S.djSet[si].roleOverride=track.roleOverride;updateRightPanel();}
    }
    return;
  }
  // Add/remove from set
  const ta=e.target.closest(".tr-addbtn[data-tid]");
  if(ta){
    const tid=ta.dataset.tid,track=allTracks().find(t=>t.id===tid);
    if(track){
      if(inSet(tid)) S.djSet=S.djSet.filter(t=>t.id!==tid);
      else S.djSet=[...S.djSet,track];
      updateRecordList();updateTabBtns();updateRightPanel();
    }
    return;
  }
  // Remove from set
  const rb=e.target.closest(".rmb[data-tid]");
  if(rb){S.djSet=S.djSet.filter(t=>t.id!==rb.dataset.tid);updateRecordList();updateTabBtns();updateRightPanel();return;}
  // Move up/down
  const mv=e.target.closest(".mv-btn[data-mv]");
  if(mv){
    const idx=parseInt(mv.dataset.idx);const arr=[...S.djSet];
    if(mv.dataset.mv==="up"&&idx>0)[arr[idx-1],arr[idx]]=[arr[idx],arr[idx-1]];
    else if(mv.dataset.mv==="dn"&&idx<arr.length-1)[arr[idx],arr[idx+1]]=[arr[idx+1],arr[idx]];
    S.djSet=arr;updateSetPanel();updateTabBtns();return;
  }
  // Clear set
  if(e.target.id==="clear-btn"){S.djSet=[];updateRecordList();updateTabBtns();updateRightPanel();}
}


// ═══════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════
(async()=>{
  // 1. Handle OAuth callback (?access_token=X&username=Y)
  const params=new URLSearchParams(window.location.search);
  if(params.has("access_token")){
    const tok=params.get("access_token")||"";
    const usr=params.get("username")||"";
    try{ await dbSave("discogs_auth",{token:tok,username:usr}); }catch(e){}
    history.replaceState({},"","/");
    S.token=tok; S.username=usr;
  } else {
    // 2. Load stored OAuth token
    try{
      const auth=await dbLoad("discogs_auth");
      if(auth&&auth.token){ S.token=auth.token; S.username=auth.username||""; }
    }catch(e){}
  }

  // 3. Load cached collection
  try{
    const cached=await dbLoad("collection_data");
    if(cached&&cached.releases&&cached.releases.length){
      S.idbSavedAt=cached.savedAt;
      S.releases=cached.releases;
      if(!S.username) S.username=cached.username||"";
      const {genres,styles,decades}=collectMeta(cached.releases);
      S.allGenres=genres; S.allStyles=styles; S.allDecades=decades;
      S.loaded=true; // auto-load cached collection on return visits
    }
  }catch(e){}

  // 4. Load saved DJ set
  try{
    const savedSet=await dbLoad("dj_set");
    if(savedSet&&Array.isArray(savedSet)&&savedSet.length) S.djSet=savedSet;
  }catch(e){}

  renderFull();
})();
