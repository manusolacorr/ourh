function updateAnalysisPanel(){
  const panel=document.getElementById("set-panel");
  if(!panel||S.tab!=="analysis") return;
  if(!S.djSet.length){
    panel.innerHTML='<div class="empty"><div class="ei"><i data-lucide="bar-chart-2" style="width:2rem;height:2rem;color:var(--muted)"></i></div><h3>No set yet</h3><p>Add tracks to see analysis.</p></div>';
    return;
  }
  const bpms=S.djSet.map(t=>t.bpm).filter(Boolean);
  const avgBPM=bpms.length?Math.round(bpms.reduce((a,b)=>a+b,0)/bpms.length):null;
  const n=S.djSet.length;
  const maxB=bpms.length?Math.max(...bpms):1;
  const sugs=setSuggestions(S.djSet);
  // Role counts
  const rc={};
  S.djSet.forEach(t=>{const r=assignRole(t);rc[r]=(rc[r]||0)+1;});
  // Genre/style counts
  const gc={},sc={};
  S.djSet.forEach(t=>{
    (t.genres||[]).forEach(g=>{gc[g]=(gc[g]||0)+1;});
    (t.styles||[]).forEach(s=>{sc[s]=(sc[s]||0)+1;});
  });
  const sG=Object.entries(gc).sort((a,b)=>b[1]-a[1]);
  const sS=Object.entries(sc).sort((a,b)=>b[1]-a[1]);
  let html='<div class="aw">';
  // Stats
  html+='<div class="asec"><div class="atitle">Set Stats</div>'
    +'<div class="srow"><span>Tracks</span><span>'+n+'</span></div>'
    +(avgBPM?'<div class="srow"><span>Avg BPM</span><span>'+avgBPM+'</span></div>':"")
    +(bpms.length>1?'<div class="srow"><span>BPM Range</span><span>'+Math.min(...bpms)+'–'+Math.max(...bpms)+'</span></div>':"")
    +'<div class="srow"><span>Releases</span><span>'+new Set(S.djSet.map(t=>t.releaseId)).size+'</span></div>'
    +'<div class="srow"><span>Est. Duration</span><span>~'+Math.round(n*6)+' min</span></div>'
  +'</div>';
  // Role breakdown
  html+='<div class="asec"><div class="atitle">Role Breakdown</div>';
  Object.values(ROLES).forEach(r=>{
    const c=rc[r.id]||0; if(!c) return;
    html+='<div class="srow">'
      +'<span style="display:flex;align-items:center;gap:0.3rem">'
        +'<span style="width:8px;height:8px;border-radius:50%;background:'+r.color+';display:inline-block"></span>'
        +r.emoji+' '+r.label
      +'</span>'
      +'<span style="display:flex;align-items:center;gap:0.35rem">'
        +'<span style="font-size:0.48rem;color:var(--muted)">'+c+'t</span>'
        +'<span style="width:'+(Math.round((c/n)*65)+5)+'px;height:3px;border-radius:2px;background:'+r.color+';display:inline-block"></span>'
      +'</span>'
    +'</div>';
  });
  html+='</div>';
  // BPM arc
  if(bpms.length>1){
    html+='<div class="asec"><div class="atitle">Energy Arc (BPM)</div><div class="bviz">';
    S.djSet.forEach(t=>{
      const role=roleOf(t);
      const h=t.bpm?Math.round((t.bpm/maxB)*100):20;
      html+='<div class="bbar" style="height:'+h+'%;background:'+role.color+'" title="'+esc(t.title)+': '+(t.bpm||"?")+'BPM · '+role.label+'"></div>';
    });
    html+='</div><div style="display:flex;justify-content:space-between;font-size:0.44rem;color:var(--muted);margin-top:0.14rem"><span>intro</span><span>—</span><span>peak</span></div></div>';
  }
  // Pitch drift table
  if(n>1){
    html+='<div class="asec"><div class="atitle">Pitch Drift</div>';
    let anyHigh=false;
    for(let i=1;i<n;i++){
      const pd=pitchDrift(S.djSet[i-1].bpm,S.djSet[i].bpm);
      if(!pd) continue;
      if(pd.high) anyHigh=true;
      html+='<div class="srow"><span style="font-size:0.52rem">'+i+'→'+(i+1)+' · '+esc(S.djSet[i].title.slice(0,18))+'</span>'
        +'<span>'+(pd.high
          ?'<span class="pdrift-warn">⚡ '+pd.sign+pd.pct+'%</span>'
          :'<span class="pdrift-ok">'+pd.sign+pd.pct+'%</span>')
        +'</span></div>';
    }
    if(anyHigh) html+='<div style="font-size:0.48rem;color:var(--red);margin-top:0.28rem;line-height:1.5">⚡ >6% = high turntable pitch strain · formula: ((B−A)/A)×100</div>';
    html+='</div>';
  }
  // Flow notes
  if(sugs.length){
    html+='<div class="asec"><div class="atitle">Flow Notes</div>';
    sugs.forEach(s=>{html+='<div class="sug">'+esc(s)+'</div>';});
    html+='</div>';
  }
  // Genre/style
  if(sG.length||sS.length){
    html+='<div class="asec"><div class="atitle">Genre & Style Mix</div>';
    if(sG.length){
      html+='<div style="font-size:0.48rem;color:var(--muted);margin-bottom:0.22rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em">Genres</div>';
      sG.forEach(([g,c])=>{
        html+='<div class="srow"><span style="font-size:0.58rem">'+esc(g)+'</span>'
          +'<span style="display:flex;align-items:center;gap:0.35rem"><span style="font-size:0.48rem;color:var(--muted)">'+c+'t</span>'
          +'<span style="width:'+(Math.round((c/n)*65)+5)+'px;height:3px;background:var(--accent);border-radius:2px;display:inline-block"></span></span></div>';
      });
    }
    if(sS.length){
      html+='<div style="font-size:0.48rem;color:var(--muted);margin:0.3rem 0 0.22rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em">Styles</div>';
      sS.forEach(([s,c])=>{
        html+='<div class="srow"><span style="font-size:0.58rem">'+esc(s)+'</span>'
          +'<span style="display:flex;align-items:center;gap:0.35rem"><span style="font-size:0.48rem;color:var(--muted)">'+c+'t</span>'
          +'<span style="width:'+(Math.round((c/n)*65)+5)+'px;height:3px;background:var(--accent2);border-radius:2px;display:inline-block"></span></span></div>';
      });
    }
    html+='</div>';
  }
  html+='</div>';
  panel.innerHTML=html;
}

function attachDragHandlers(){
  document.querySelectorAll(".si[draggable]").forEach(el=>{
    el.addEventListener("dragstart",e=>{S.dragIdx=parseInt(el.dataset.si);el.classList.add("dragging");e.dataTransfer.effectAllowed="move";});
    el.addEventListener("dragend",()=>{el.classList.remove("dragging");document.querySelectorAll(".si").forEach(s=>s.classList.remove("drag-over"));S.dragIdx=null;S.dragOverIdx=null;});
    el.addEventListener("dragover",e=>{e.preventDefault();e.dataTransfer.dropEffect="move";const oi=parseInt(el.dataset.si);if(oi!==S.dragIdx){document.querySelectorAll(".si").forEach(s=>s.classList.remove("drag-over"));el.classList.add("drag-over");S.dragOverIdx=oi;}});
    el.addEventListener("drop",e=>{e.preventDefault();const from=S.dragIdx,to=parseInt(el.dataset.si);if(from!==null&&from!==to){const arr=[...S.djSet];const[moved]=arr.splice(from,1);arr.splice(to,0,moved);S.djSet=arr;updateSetPanel();updateTabBtns();}});
  });
}


// ═══════════════════════════════════════════════════════
//  TAG CLOUD — additive stacked filters
// ═══════════════════════════════════════════════════════
function renderTagCloud(){
  const rf=S.roleFilters,gf=S.genreFilters,sf=S.styleFilters,df=S.decadeFilters;
  function chip(label,cls,attr,val){
    var a=val!==undefined?attr+'="'+esc(val)+'"':attr;
    return '<button class="chip'+(cls?' '+cls:'')+'" '+a+'>'+label+'</button>';
  }
  function section(title,chips,hasActive){
    return '<div class="tc-section">'
      +'<div class="tc-lbl">'+title
        +'<span class="tc-clear'+(hasActive?' active':'')+'" data-tc-clear="'+title.toLowerCase()+'">clear</span>'
      +'</div>'
      +'<div class="tc-chips">'+chips+'</div>'
    +'</div>';
  }
  var roleChips=chip('All',rf.size===0?'on-all':'','data-rc-clear','')
    +Object.values(ROLES).map(function(r){return chip(r.label,rf.has(r.id)?'on-role-'+r.id:'','data-rc',r.id);}).join('');
  var genreChips=chip('All',gf.size===0?'on-all':'','data-gc-clear','')
    +S.allGenres.map(function(g){return chip(esc(g),gf.has(g)?'on-genre':'','data-gc',g);}).join('');
  var styleChips=chip('All',sf.size===0?'on-all':'','data-sc-clear','')
    +S.allStyles.map(function(s){return chip(esc(s),sf.has(s)?'on-style':'','data-sc',s);}).join('');
  var decadeChips=chip('All',df.size===0?'on-all':'','data-dc-clear','')
    +S.allDecades.map(function(d){return chip(d,df.has(d)?'on-decade':'','data-dc',d);}).join('');
  return section('Role',roleChips,rf.size>0)
    +(S.allGenres.length?section('Genre',genreChips,gf.size>0):'')
    +(S.allStyles.length?section('Style',styleChips,sf.size>0):'')
    +(S.allDecades.length?section('Decade',decadeChips,df.size>0):'');
}
function updateChips(){
  var tc=document.getElementById("tagcloud-inner");
  if(tc) tc.innerHTML=renderTagCloud();
  updateTCBar();
}
function updateTCBar(){
  var pills=document.getElementById("tc-pills");
  if(!pills) return;
  var active=[];
  S.roleFilters.forEach(function(id){var r=ROLES[id];if(r)active.push({label:r.label,color:r.color});});
  S.genreFilters.forEach(function(g){active.push({label:g,color:"var(--accent)"});});
  S.styleFilters.forEach(function(s){active.push({label:s,color:"var(--accent2)"});});
  S.decadeFilters.forEach(function(d){active.push({label:d,color:"#2c7c5a"});});
  if(!active.length){
    pills.innerHTML="<em style='font-size:0.5rem;color:var(--muted)'>no filters</em>";
  } else {
    var html=active.slice(0,6).map(function(p){
      return "<span class='tagcloud-bar-pill' style='background:"+p.color+"'>"+esc(p.label)+"</span>";
    }).join("");
    if(active.length>6) html+="<em style='font-size:0.5rem;color:var(--muted)'> +"+(active.length-6)+" more</em>";
    pills.innerHTML=html;
  }
}

function startLoad(){
  if(!S.token.trim()){alert("Please enter your Discogs token.");return;}
  loadCollection();
}
function doCSVLoad(file){
  if(!file) return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const releases=parseCSV(e.target.result);
      if(!releases.length) throw new Error("No records found.");
      const {genres,styles,decades}=collectMeta(releases);
      Object.assign(S,{releases,allGenres:genres,allStyles:styles,allDecades:decades,
        totalReleases:releases.length,loaded:true,error:""});
      renderFull();scheduleSave();
    }catch(err){S.error="CSV error: "+err.message;renderFull();}
  };
  r.readAsText(file);
}

    const anyFilter=S.roleFilters.size>0||S.genreFilters.size>0||S.styleFilters.size>0||S.decadeFilters.size>0;

function handleGlobalClick(e){
  // Role filter clear
  if(e.target.closest("[data-rc-clear]")){S.roleFilters=new Set();S.page=1;updateChips();updateRecordList();return;}
  // Role filter chip
  const rc=e.target.closest("[data-rc]");
  if(rc&&!rc.hasAttribute("data-rc-clear")){
    const id=rc.dataset.rc;const nf=new Set(S.roleFilters);nf.has(id)?nf.delete(id):nf.add(id);
    S.roleFilters=nf;S.page=1;updateChips();updateRecordList();return;
  }
  // Genre filter clear
  if(e.target.closest("[data-gc-clear]")){S.genreFilters=new Set();S.page=1;updateChips();updateRecordList();return;}
  // Genre filter chip
  const gc=e.target.closest("[data-gc]");
  if(gc&&!gc.hasAttribute("data-gc-clear")){
    const g=gc.dataset.gc;const nf=new Set(S.genreFilters);nf.has(g)?nf.delete(g):nf.add(g);
    S.genreFilters=nf;S.page=1;updateChips();updateRecordList();return;
  }
  // Style filter clear
  if(e.target.closest("[data-sc-clear]")){S.styleFilters=new Set();S.page=1;updateChips();updateRecordList();return;}
  // Style filter chip
  const sc=e.target.closest("[data-sc]");
  if(sc&&!sc.hasAttribute("data-sc-clear")){
    const s=sc.dataset.sc;const nf=new Set(S.styleFilters);nf.has(s)?nf.delete(s):nf.add(s);
    S.styleFilters=nf;S.page=1;updateChips();updateRecordList();return;
  }
  // Decade filter clear
  if(e.target.closest("[data-dc-clear]")){S.decadeFilters=new Set();S.page=1;updateChips();updateRecordList();return;}
  // Decade filter chip
  const dc=e.target.closest("[data-dc]");
  if(dc&&!dc.hasAttribute("data-dc-clear")){
    const d=dc.dataset.dc;const nf=new Set(S.decadeFilters);nf.has(d)?nf.delete(d):nf.add(d);
    S.decadeFilters=nf;S.page=1;updateChips();updateRecordList();return;
  }
  // Role override per-track button
  const rs=e.target.closest("[data-rs]");
  if(rs){
    const[tid,role]=rs.dataset.rs.split("|");
    const track=allTracks().find(t=>t.id===tid);
    if(track){
      track.roleOverride=(track.roleOverride===role)?null:role;
      updateRecordList();
      const si=S.djSet.findIndex(t=>t.id===tid);
      if(si>=0){S.djSet[si].roleOverride=track.roleOverride;updateRightPanel();}
    }
    return;
  }
  // Add/remove from set
  const ta=e.target.closest(".tr-addbtn[data-tid]");
  if(ta){
    const tid=ta.dataset.tid,track=allTracks().find(t=>t.id===tid);
    if(track){
      if(inSet(tid)) S.djSet=S.djSet.filter(t=>t.id!==tid);
      else S.djSet=[...S.djSet,track];
      updateRecordList();updateTabBtns();updateRightPanel();
    }
    return;
  }
  // Remove from set
  const rb=e.target.closest(".rmb[data-tid]");
  if(rb){S.djSet=S.djSet.filter(t=>t.id!==rb.dataset.tid);updateRecordList();updateTabBtns();updateRightPanel();return;}
  // Move up/down
  const mv=e.target.closest(".mv-btn[data-mv]");
  if(mv){
    const idx=parseInt(mv.dataset.idx);const arr=[...S.djSet];
    if(mv.dataset.mv==="up"&&idx>0)[arr[idx-1],arr[idx]]=[arr[idx],arr[idx-1]];
    else if(mv.dataset.mv==="dn"&&idx<arr.length-1)[arr[idx],arr[idx+1]]=[arr[idx+1],arr[idx]];
    S.djSet=arr;updateSetPanel();updateTabBtns();return;
  }
  // Clear set
  if(e.target.id==="clear-btn"){S.djSet=[];updateRecordList();updateTabBtns();updateRightPanel();}
  // Excel exports
  if(e.target.id==="export-lib-btn") exportLibraryXLS();
  if(e.target.id==="export-set-btn") exportSetXLS();
  // Smart Sort — delegated because button is dynamically injected
  if(e.target.closest("#engine2-btn")){
    if(!S.djSet.length) return;
    S.djSet=engine2SortSet(S.djSet);updateSetPanel();updateTabBtns();
  }
  // Theme toggle — also delegated
  if(e.target.closest("#theme-toggle-btn")){
    const html=document.documentElement;
    const next=(html.getAttribute("data-theme")||"dark")==="dark"?"light":"dark";
    html.setAttribute("data-theme",next);
    localStorage.setItem("ourh-theme",next);
    const icon=document.getElementById("theme-icon");
    if(icon) icon.setAttribute("data-lucide",next==="dark"?"sun":"moon");
    if(typeof lucide!=="undefined") lucide.createIcons();
  }
}

(async()=>{
  // 0. Theme init — restore saved preference, default dark
  (function(){
    const saved = localStorage.getItem('ourh-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);
  })();

  // 1. Handle OAuth callback (?access_token=X&username=Y)
  const params=new URLSearchParams(window.location.search);
  if(params.has("access_token")){
    const tok=params.get("access_token")||"";
    const usr=params.get("username")||"";
    try{ await dbSave("discogs_auth",{token:tok,username:usr}); }catch(e){}
    history.replaceState({},"","/");
    S.token=tok; S.username=usr;
  } else {
    // 2. Load stored OAuth token
    try{
      const auth=await dbLoad("discogs_auth");
      if(auth&&auth.token){ S.token=auth.token; S.username=auth.username||""; }
    }catch(e){}
  }

  // 3. Load cached collection
  try{
    const cached=await dbLoad("collection_data");
    if(cached&&cached.releases&&cached.releases.length){
      S.idbSavedAt=cached.savedAt;
      S.releases=cached.releases;
      if(!S.username) S.username=cached.username||"";
      const {genres,styles,decades}=collectMeta(cached.releases);
      S.allGenres=genres; S.allStyles=styles; S.allDecades=decades;
      S.loaded=true; // auto-load cached collection on return visits
    }
  }catch(e){}

  // 4. Load saved DJ set
  try{
    const savedSet=await dbLoad("dj_set");
    if(savedSet&&Array.isArray(savedSet)&&savedSet.length) S.djSet=savedSet;
  }catch(e){}

  renderFull();
  // Init Lucide icons
  if(typeof lucide !== 'undefined') lucide.createIcons();
})();



// ── Excel export ──────────────────────────────────────────────────────────
function exportLibraryXLS(){
  const tracks = allTracks();
  const rows = tracks.map(t => ({
    "Artist":       t.trackArtist || t.releaseArtist || "",
    "Track":        t.title || "",
    "Release":      t.releaseTitle || "",
    "Label":        t.label || "",
    "Year":         t.year || "",
    "Position":     t.pos || "",
    "BPM":          t.bpm || "",
    "Key":          t.key || "",
    "Role":         roleLabel(t),
    "Genre":        (t.genres||[]).join(", "),
    "Style":        (t.styles||[]).join(", "),
    "Duration":     t.duration || "",
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  // Column widths
  ws['!cols'] = [
    {wch:28},{wch:36},{wch:32},{wch:22},{wch:6},{wch:6},
    {wch:6},{wch:6},{wch:12},{wch:22},{wch:28},{wch:8}
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Library");
  XLSX.writeFile(wb, `ourh-library-${S.username}.xlsx`);
}

function exportSetXLS(){
  if(!S.djSet.length) return;
  const rows = S.djSet.map((t, i) => {
    const prev = i > 0 ? S.djSet[i-1] : null;
    const compat = prev ? compatLabel(prev, t) : "";
    return {
      "#":            i + 1,
      "Artist":       t.trackArtist || t.releaseArtist || "",
      "Track":        t.title || "",
      "Release":      t.releaseTitle || "",
      "BPM":          t.bpm || "",
      "Key":          t.key || "",
      "Role":         roleLabel(t),
      "Transition":   compat,
      "Genre":        (t.genres||[]).join(", "),
      "Style":        (t.styles||[]).join(", "),
      "Duration":     t.duration || "",
      "Label":        t.label || "",
      "Year":         t.year || "",
    };
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [
    {wch:4},{wch:28},{wch:36},{wch:28},{wch:6},{wch:6},
    {wch:12},{wch:12},{wch:20},{wch:24},{wch:8},{wch:20},{wch:6}
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "DJ Set");
  XLSX.writeFile(wb, `ourh-set-${S.username}.xlsx`);
}

function roleLabel(t){
  if(t.roleOverride) return t.roleOverride;
  const bpm = t.bpm || 0;
  if(bpm < 110) return "Warm Up";
  if(bpm < 124) return "Mid Set";
  if(bpm < 135) return "Peak Time";
  return "After-Hours";
}

function compatLabel(a, b){
  if(!a||!b) return "";
  const ak = a.key||"", bk = b.key||"";
  if(ak === bk) return "Perfect";
  const an = parseInt(ak), bn = parseInt(bk);
  const sameMode = (ak.endsWith("A")&&bk.endsWith("A"))||(ak.endsWith("B")&&bk.endsWith("B"));
  if(sameMode && (Math.abs(an-bn)===1||(an===1&&bn===12)||(an===12&&bn===1))) return "Compatible";
  if(!sameMode && an===bn) return "Relative";
  return "";
}
